name: vs-buildtools-repro

# Reproduces (or rules out) the VS Build Tools installer hang on the July 2026
# Windows Server base-image update, using GitHub-hosted runners.
#
# Context: the confirmed break is on Server 2019 / ltsc2019, build 17763.9020
# (KB5099538) — see microsoft/Windows-Containers#641. GitHub retired the
# windows-2019 runner in 2025, and hosted windows-2022 runners can't run an
# ltsc2019 container (Hyper-V isolation needs nested virt). So this runs on
# Server 2022 with ltsc2022 to test whether the SAME regression is present there.
#
# The key test is the CURRENT (patched) ltsc2022 base. The workflow also lists
# the real dated tags from the registry so we can add a pre-July baseline for a
# clean A/B once we know which ones exist.

on:
  push:
  workflow_dispatch:

jobs:
  repro:
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Runner OS build
        run: cmd /c ver

      - name: Available dated ltsc2022 base tags (authoritative, from the registry)
        shell: powershell
        run: |
          (Invoke-RestMethod https://mcr.microsoft.com/v2/dotnet/framework/runtime/tags/list).tags |
            Where-Object { $_ -like '4.8-2*-windowsservercore-ltsc2022' } | Sort-Object

      - name: Current base OS build
        run: docker run --rm mcr.microsoft.com/dotnet/framework/runtime:4.8-windowsservercore-ltsc2022 cmd /c ver

      # If the installer hangs, this step is killed at the timeout and the job
      # fails — that timeout IS the reproduction signal. A working base finishes
      # (downloads VC.Tools) well under the limit and prints INSTALL COMPLETED.
      - name: Install VS Build Tools on CURRENT ltsc2022 (does it hang?)
        timeout-minutes: 20
        run: docker build --no-cache --build-arg BASE=mcr.microsoft.com/dotnet/framework/runtime:4.8-windowsservercore-ltsc2022 -t vsrepro .
